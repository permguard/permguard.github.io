<svg viewBox="0 0 1040 650" width="1040" height="650" xmlns="http://www.w3.org/2000/svg">
  <rect width="1040" height="650" fill="#0d0d0d"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- ─── CARD 1: Platform Administration Zone ─── -->
  <rect x="20" y="20" width="460" height="265" rx="6"
        fill="#1a1a1a" stroke="#555" stroke-width="1.5" stroke-dasharray="10,5"/>
  <!-- lock body -->
  <rect x="37" y="33" width="18" height="13" rx="2" fill="#888"/>
  <!-- lock shackle -->
  <path d="M40 33 A 6 6 0 0 1 52 33" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <!-- zone name -->
  <text x="63" y="46" font-family="Arial,sans-serif" font-size="13" font-weight="bold"
        fill="white" letter-spacing="0.3">PLATFORM-ADMINISTRATION-ZONE</text>
  <!-- zone id -->
  <text x="37" y="72" font-family="Arial,sans-serif" font-size="12" font-style="italic"
        fill="#ff4488">Zone ID: 836576733282</text>
  <!-- cube — top face -->
  <polygon points="248,115 275,129 248,143 221,129" fill="#5a5a5a" stroke="#888" stroke-width="1.5"/>
  <!-- cube — left face -->
  <polygon points="221,129 248,143 248,175 221,161" fill="#383838" stroke="#888" stroke-width="1.5"/>
  <!-- cube — right face -->
  <polygon points="275,129 248,143 248,175 275,161" fill="#484848" stroke="#888" stroke-width="1.5"/>
  <!-- ledger label -->
  <text x="210" y="205" font-family="Arial,sans-serif" font-size="14" font-style="italic"
        fill="#ff4488">Ledger: ROOT</text>

  <!-- ─── CARD 2: Operations Management Zone ─── -->
  <rect x="560" y="20" width="460" height="265" rx="6"
        fill="#1a1a1a" stroke="#555" stroke-width="1.5" stroke-dasharray="10,5"/>
  <rect x="577" y="33" width="18" height="13" rx="2" fill="#888"/>
  <path d="M580 33 A 6 6 0 0 1 592 33" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <text x="603" y="46" font-family="Arial,sans-serif" font-size="13" font-weight="bold"
        fill="white" letter-spacing="0.3">OPERATIONS-MANAGEMENT-ZONE</text>
  <text x="577" y="72" font-family="Arial,sans-serif" font-size="12" font-style="italic"
        fill="#ff4488">Zone ID: 121820121075</text>
  <!-- cube -->
  <polygon points="788,115 815,129 788,143 761,129" fill="#5a5a5a" stroke="#888" stroke-width="1.5"/>
  <polygon points="761,129 788,143 788,175 761,161" fill="#383838" stroke="#888" stroke-width="1.5"/>
  <polygon points="815,129 788,143 788,175 815,161" fill="#484848" stroke="#888" stroke-width="1.5"/>
  <text x="750" y="205" font-family="Arial,sans-serif" font-size="14" font-style="italic"
        fill="#ff4488">Ledger: ROOT</text>

  <!-- ─── CARD 3: Patient Services Zone ─── -->
  <rect x="290" y="360" width="460" height="265" rx="6"
        fill="#1a1a1a" stroke="#555" stroke-width="1.5" stroke-dasharray="10,5"/>
  <rect x="307" y="373" width="18" height="13" rx="2" fill="#888"/>
  <path d="M310 373 A 6 6 0 0 1 322 373" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <text x="333" y="386" font-family="Arial,sans-serif" font-size="13" font-weight="bold"
        fill="white" letter-spacing="0.3">PATIENT-SERVICES-ZONE</text>
  <text x="307" y="412" font-family="Arial,sans-serif" font-size="12" font-style="italic"
        fill="#ff4488">Zone ID: 927579003246</text>
  <!-- cube -->
  <polygon points="518,455 545,469 518,483 491,469" fill="#5a5a5a" stroke="#888" stroke-width="1.5"/>
  <polygon points="491,469 518,483 518,515 491,501" fill="#383838" stroke="#888" stroke-width="1.5"/>
  <polygon points="545,469 518,483 518,515 545,501" fill="#484848" stroke="#888" stroke-width="1.5"/>
  <text x="480" y="545" font-family="Arial,sans-serif" font-size="14" font-style="italic"
        fill="#ff4488">Ledger: ROOT</text>
</svg>
